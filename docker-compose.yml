version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: quiz_postgres
    restart: always
    environment:
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quiz
      POSTGRES_DB: quizdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: quiz_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: quiz_backend
    restart: always
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://quiz:quiz@postgres:5432/quizdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: supersecret
    volumes:
      - .:/app
    command: npm run dev

volumes:
  pgdata: